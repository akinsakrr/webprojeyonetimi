    <title>FitnessPower - Bench Press</title>

        body {

            color: #333;
        }
        
        header {

        }
        
        .search-container {

            margin-top: 10px;
        }
        
        .search-container.active {
            display: block;

        .search-container input {

            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .product-hero {
            padding: 50px 0;
            background-color: #f9f9f9;
        }
        
        .product-hero-content {
            display: flex;

        }
        
        .product-hero-image {
            flex: 1;
            min-width: 300px;
        }
        
        .product-hero-image img {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .product-hero-text {
            flex: 1;
            min-width: 300px;
        }
        
        .product-hero-text h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        .product-hero-text p {
            margin-bottom: 20px;
            color: #666;
        }
        
        .product-hero-text .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }
        
        .product-hero-text .btn:hover {

        }
        
        .product-details {

            position: relative;
            padding-bottom: 10px;
        }
        
        .product-features h2:after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 50px;
            height: 3px;
            background-color: #ff4500;
        }
        
        .features-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .feature-item {
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 8px;

        .feature-item p {
            color: #666;

            width: 50px;
            height: 3px;
            background-color: #ff4500;
        }
        
        .steps-list {
            counter-reset: step-counter;
        }
        
        .step-item {
            margin-bottom: 20px;
            padding-left: 50px;
            position: relative;
        }
        
        .step-item:before {
            content: counter(step-counter);
            counter-increment: step-counter;
            position: absolute;
            left: 0;
            top: 0;
            width: 30px;
            height: 30px;
            background-color: #333;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .step-item h3 {

            gap: 20px;
        }
        
        .variation-item {
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        
        .variation-item:hover {

            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

            width: 100%;
